name: Python Lint

on:
    push: 

jobs:
    Python_Installation:
        runs-on: ubuntu-latest
        strategy:
          matrix: 
            python-version: ["3.10","3.11","3.12"]
        steps:
            - name: Installing Python ${{matrix.python-version}}              
              run: |            
                sudo apt-get update
                sudo apt-get install python${{matrix.python-version}} -y            

            - name: Verify Installation
              run: python --version
