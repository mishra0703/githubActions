# Scans all API Keys , Sensitive Data , Credentials 
# Tool Name : Gitleaks

name: Secrets Scan

on: 
    workflow_call:

jobs:
    Scan_Secrets:        
        runs-on: ubuntu-latest
        steps:
        
        - name: Checkout Code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Run Gitleaks Scanner 
          uses: gitleaks/gitleaks-action@v3
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Github actions manages this token automatically, no need to create a personal access token
