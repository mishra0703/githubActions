name: Use Of Secrets

on:
    push:


jobs:
    Secrets_Variable:
        runs-on: ubuntu-latest
        env:
            DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
            DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        steps:
            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: ${{ env.DOCKER_USERNAME }}
                password: ${{ env.DOCKER_TOKEN }}
              
            - name: Docker Status
              run: docker info    
            