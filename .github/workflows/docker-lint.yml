# Scan the Dockerfile for issues & CVEs

name: Docker Lint

on:
    workflow_call:

jobs:
    Dockerfile_Scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Scan Dockerfile
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: Dockerfile

