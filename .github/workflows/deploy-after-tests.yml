name: Deploy Workflow

on:
     workflow_run:
       workflows: ["Testing"]
       types: [completed]


jobs:
    Deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Warning
              if: ${{ github.event.workflow_run.conclusion != 'success' }}
              run: |
                echo "Warning !!! Warning !!! Warning !!! Warning !!!"
                echo "Triggering workflow did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }})"
                echo "Skipping deployment."
                exit 1

            - name: Deploying
              if: ${{ github.event.workflow_run.conclusion == 'success' }}
              run: echo "Tests passed — deploying now..."