name: Env Vars 

on:
  push:

env:
    APP_NAME: myapp

jobs:
  Printing_Env-Vars:
    runs-on: ubuntu-latest
    env:
        ENVIRONMENT: staging
    steps:
      - name: Running Build
        env:
            VERSION: 1.0.0
        run: |
            echo "App Name : $APP_NAME"
            echo "Environment on which app is running : $ENVIRONMENT"
            echo "App Version: $Version"