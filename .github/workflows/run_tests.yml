name: Testing app.py in CI

on:
    workflow_dispatch: 


jobs:
    Run_Test:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                # cache: 'pip       # Built-in setup-python Caching

            # Standalone actions/cache (For custom path or tools) 
            - name: Cache Pip Packages
              uses: actions/cache@v4        # EXACTLY HERE :  After setup, before install
              with:
                path: ~/.cache/pip          # The precise global directory pip uses on Ubuntu
                key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}     # Use with requirements.txt
                # key: ${{ runner.os }}-pip-requests    # For specific dependency

                
            - name: Install Dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Running Script
              run: python test-app/app.py

            