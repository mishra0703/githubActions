name: Schedule Trigger

on:
  schedule:
    - cron: '27 13 * * *' 

jobs:
  Schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checking Scheduled Trigger
        run: echo "This workflow at runs every 5 minutes"

      - name: Display and Verify IST Date
        env:
          TZ: "Asia/Kolkata"
        run: |
          echo "The current time in IST is: $(date)"
          echo "The explicit date is: $(date +'%Y-%m-%d')"
