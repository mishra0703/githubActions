name: Python Lint

on:
    push:
        branches: [main]
    # workflow_dispatch: 

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false          # False : Sab chalenge no matter any one of them will fail
        # fail-fast: true        # True : Koi nhi chalega if any one of them will fail
          matrix: 
            python-version: ["3.9","3.10","3.11","3.12","3.13","3.14"]
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Python ${{matrix.python-version}}
              uses: actions/setup-python@v5
              with:
                python-version: ${{matrix.python-version}}
            
            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Run Linter
              run: flake8 app.py
