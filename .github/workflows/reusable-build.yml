name: Reusable Workflow

on:
    workflow_call: 
        inputs:
            app_name:
                type: string
                required: true
            environment:
                type: string
                required: true
                default: staging
        secrets:
            DOCKERHUB_TOKEN: 
                required: true
        outputs:                        
            build_version:
                description: "The generated build version"
                value: ${{ jobs.reusable_workflow.outputs.build_version }}



jobs:
    reusable_workflow:
        runs-on: ubuntu-latest
        outputs:                          
          build_version: ${{ steps.version.outputs.build_version }}
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
              
            - name: Building App
              run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"

            - name: Docker Token Check
              run: echo "DockerHub Token is set ${{ secrets.DOCKERHUB_TOKEN != '' }}"
              
            - name: Generate Version           
              id: version
              run: |
                SHORT_SHA=$(git rev-parse --short HEAD)
                VERSION="v1.0-$SHORT_SHA"
                echo "build_version=$VERSION" >> "$GITHUB_OUTPUT"