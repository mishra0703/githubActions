# Packages issues or Vulnerabilities Scan
# Tools Name : pip-audit

name: Dependencies Scan 

on:
    workflow_call: 

# By default, GitHub Actions gives our GITHUB_TOKEN (the auto-generated token each workflow run gets) read AND write access to almost everything in the repo — contents, issues, PRs, packages, etc. That's way more than most workflows actually need.
# The permissions: block let us override this and grant only what's necessary — this is the principle of least privilege applied to CI/CD.
permissions:
  contents: read


jobs:
    Dependency_Scan:
        runs-on: ubuntu-latest
        steps:            
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Python 3.14
              uses: actions/setup-python@v5
              with:
                python-version: "3.14"

            - name: Pip Dependency Audit
              run: pip install pip-audit

            - name: Audit Dependencies
              run: pip-audit -r requirements.txt

          
