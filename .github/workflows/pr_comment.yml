name: Making PR Comment 

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write   # needed because we're posting a comment below

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on a PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Thanks for the PR! CI checks are running.'
            })